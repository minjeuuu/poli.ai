    <style>
        /* Custom Smooth Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }
        
        /* Global Animation Smoothing */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Force hardware acceleration on animateable elements for smoothness */
        .animate-in, .animate-out, .transition-all {
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        /* User Preference overrides */
        .debug-grid * {
            outline: 1px solid rgba(255, 0, 0, 0.1);
        }

        .reduce-motion * {
            transition-duration: 0s !important;
            animation-duration: 0s !important;
        }

        .typography-sans * { font-family: 'Inter', sans-serif !important; }
        .typography-mono * { font-family: 'JetBrains Mono', monospace !important; }
        .typography-system * { font-family: system-ui, -apple-system, sans-serif !important; }
        .typography-serif * { font-family: 'Merriweather', serif !important; }

        /* User Preference: Border Radius */
        :root[data-radius="None"] .rounded-sm, :root[data-radius="None"] .rounded, :root[data-radius="None"] .rounded-md, :root[data-radius="None"] .rounded-lg, :root[data-radius="None"] .rounded-xl, :root[data-radius="None"] .rounded-2xl, :root[data-radius="None"] .rounded-3xl, :root[data-radius="None"] .rounded-full { border-radius: 0px !important; }
        
        :root[data-radius="Small"] .rounded-md, :root[data-radius="Small"] .rounded-lg, :root[data-radius="Small"] .rounded-xl, :root[data-radius="Small"] .rounded-2xl { border-radius: 4px !important; }
        
        :root[data-radius="Large"] .rounded-sm, :root[data-radius="Large"] .rounded, :root[data-radius="Large"] .rounded-md, :root[data-radius="Large"] .rounded-lg, :root[data-radius="Large"] .rounded-xl { border-radius: 16px !important; }
        
        :root[data-radius="Full"] .rounded-sm, :root[data-radius="Full"] .rounded, :root[data-radius="Full"] .rounded-md, :root[data-radius="Full"] .rounded-lg, :root[data-radius="Full"] .rounded-xl, :root[data-radius="Full"] .rounded-2xl { border-radius: 9999px !important; }

        /* User Preference: Density */
        :root[data-density="Compact"] .p-6 { padding: 1rem !important; }
        :root[data-density="Compact"] .p-8 { padding: 1.5rem !important; }
        :root[data-density="Compact"] .gap-4 { gap: 0.5rem !important; }
        :root[data-density="Compact"] .gap-6 { gap: 1rem !important; }
        :root[data-density="Compact"] .gap-8 { gap: 1.5rem !important; }
        :root[data-density="Compact"] .py-4 { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; }
        
        :root[data-density="Spacious"] .p-6 { padding: 2.5rem !important; }
        :root[data-density="Spacious"] .p-8 { padding: 3rem !important; }
        :root[data-density="Spacious"] .p-12 { padding: 4rem !important; }
        :root[data-density="Spacious"] .gap-4 { gap: 1.5rem !important; }
        :root[data-density="Spacious"] .gap-6 { gap: 2.5rem !important; }
        :root[data-density="Spacious"] .gap-8 { gap: 3.5rem !important; }
        /* User Preference: Blur Effects */
        :root[data-blur="false"] {
             --tw-backdrop-blur: blur(0px) !important;
        }

        /* User Preference: Reader Width */
        :root[data-reader-width="Narrow"] .max-w-4xl { max-width: 600px !important; }
        :root[data-reader-width="Wide"] .max-w-4xl { max-width: 1200px !important; }
        :root[data-reader-width="Full"] .max-w-4xl { max-width: 100% !important; }
